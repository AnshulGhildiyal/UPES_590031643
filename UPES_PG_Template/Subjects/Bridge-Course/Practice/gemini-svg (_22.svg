<svg width="600" height="150" xmlns="http://www.w3.org/2000/svg">
  <rect x="50" y="20" width="500" height="120" rx="10" fill="#2d3436"/>
  
  <!-- Division vs Modulo -->
  <text x="150" y="50" fill="#00cec9" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">Floor Division (//)</text>
  <text x="150" y="80" fill="#dfe6e9" font-family="monospace" font-size="14" text-anchor="middle">7384 // 3600</text>
  <text x="150" y="110" fill="#00cec9" font-family="monospace" font-size="16" text-anchor="middle">Result: 2 (Hours)</text>

  <line x1="300" y1="30" x2="300" y2="130" stroke="#636e72" stroke-width="2"/>
  
  <text x="450" y="50" fill="#e84393" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">Modulo (%)</text>
  <text x="450" y="80" fill="#dfe6e9" font-family="monospace" font-size="14" text-anchor="middle">7384 % 3600</text>
  <text x="450" y="110" fill="#e84393" font-family="monospace" font-size="16" text-anchor="middle">Remainder: 184 (Secs)</text>
</svg>
