<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Interactive Mode -->
  <rect x="20" y="20" width="250" height="150" rx="10" fill="#2d3436"/>
  <text x="145" y="45" fill="#00b894" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Interactive (Texting)</text>
  <rect x="35" y="60" width="120" height="30" rx="15" fill="#0984e3"/>
  <text x="95" y="80" fill="white" font-family="sans-serif" font-size="12" text-anchor="middle">"What's 2+2?"</text>
  <rect x="135" y="100" width="120" height="30" rx="15" fill="#636e72"/>
  <text x="195" y="120" fill="white" font-family="sans-serif" font-size="12" text-anchor="middle">"It's 4, bro."</text>
  
  <!-- Scripting Mode -->
  <rect x="320" y="20" width="250" height="150" rx="10" fill="#2d3436"/>
  <text x="445" y="45" fill="#e84393" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Scripting (Syllabus)</text>
  <rect x="350" y="60" width="190" height="100" fill="#dfe6e9"/>
  <text x="360" y="80" fill="#2d3436" font-family="monospace" font-size="10">1. def week_one():</text>
  <text x="360" y="100" fill="#2d3436" font-family="monospace" font-size="10">2.     print("Intro")</text>
  <text x="360" y="120" fill="#2d3436" font-family="monospace" font-size="10">3. week_one()</text>
</svg>
