<svg width="600" height="150" xmlns="http://www.w3.org/2000/svg">
  <!-- Matrix -->
  <rect x="50" y="20" width="120" height="100" fill="#2d3436" rx="5" stroke="#636e72" stroke-width="2"/>
  <text x="70" y="45" fill="white" font-family="monospace" font-size="14">12   5   8</text>
  <text x="70" y="75" fill="white" font-family="monospace" font-size="14"> 7  25  14</text>
  <text x="70" y="105" fill="white" font-family="monospace" font-size="14"> 3  19  11</text>
  
  <!-- Axis 0 (Columns) -->
  <path d="M 80 130 L 80 150" stroke="#00b894" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="130" y="145" fill="#00b894" font-family="sans-serif" font-weight="bold" font-size="12">axis=0</text>
  
  <!-- Axis 1 (Rows) -->
  <path d="M 180 40 L 210 40" stroke="#0984e3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="240" y="45" fill="#0984e3" font-family="sans-serif" font-weight="bold" font-size="12">axis=1</text>
  
  <rect x="290" y="60" width="280" height="50" fill="#e84393" rx="10"/>
  <text x="430" y="80" fill="white" font-family="monospace" font-size="12" text-anchor="middle">.flatten()</text>
  <text x="430" y="100" fill="white" font-family="monospace" font-size="12" text-anchor="middle">[12, 5, 8, 7, 25, 14, 3, 19, 11]</text>
</svg>
