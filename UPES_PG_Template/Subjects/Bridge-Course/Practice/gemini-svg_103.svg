<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="760" viewBox="0 0 1250 760">

<rect width="1250" height="760" fill="white"></rect>

<!-- ================= TITLE ================= -->

<text x="625" y="42" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold">
Matrix Multiplication (Dot Product)
</text>

<text x="625" y="72" text-anchor="middle" font-family="Arial" font-size="17">
Each value in the result comes from multiplying one ROW of Matrix A with one COLUMN of Matrix B.
</text>

<!-- ================= MATRIX A ================= -->

<text x="170" y="120" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Matrix A
</text>

<rect x="60" y="150" width="220" height="220" fill="#EEF6FF" stroke="#2563EB" stroke-width="2"></rect>

<!-- Grid -->

<line x1="133" y1="150" x2="133" y2="370" stroke="#888"></line>
<line x1="206" y1="150" x2="206" y2="370" stroke="#888"></line>

<line x1="60" y1="223" x2="280" y2="223" stroke="#888"></line>
<line x1="60" y1="296" x2="280" y2="296" stroke="#888"></line>

<!-- Numbers -->

<text x="96" y="193" text-anchor="middle" font-family="Courier New" font-size="20">1</text>
<text x="169" y="193" text-anchor="middle" font-family="Courier New" font-size="20">2</text>
<text x="242" y="193" text-anchor="middle" font-family="Courier New" font-size="20">3</text>

<text x="96" y="266" text-anchor="middle" font-family="Courier New" font-size="20">4</text>
<text x="169" y="266" text-anchor="middle" font-family="Courier New" font-size="20">5</text>
<text x="242" y="266" text-anchor="middle" font-family="Courier New" font-size="20">6</text>

<text x="96" y="339" text-anchor="middle" font-family="Courier New" font-size="20">7</text>
<text x="169" y="339" text-anchor="middle" font-family="Courier New" font-size="20">8</text>
<text x="242" y="339" text-anchor="middle" font-family="Courier New" font-size="20">9</text>

<!-- Highlight Row -->

<rect x="60" y="150" width="220" height="73" fill="#93C5FD" opacity="0.35"></rect>

<!-- ================= X ================= -->

<text x="345" y="280" text-anchor="middle" font-family="Arial" font-size="44" font-weight="bold">
×
</text>

<!-- ================= MATRIX B ================= -->

<text x="525" y="120" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Matrix B
</text>

<rect x="415" y="150" width="220" height="220" fill="#FFF8DC" stroke="#D97706" stroke-width="2"></rect>

<line x1="488" y1="150" x2="488" y2="370" stroke="#888"></line>
<line x1="561" y1="150" x2="561" y2="370" stroke="#888"></line>

<line x1="415" y1="223" x2="635" y2="223" stroke="#888"></line>
<line x1="415" y1="296" x2="635" y2="296" stroke="#888"></line>

<text x="451" y="193" text-anchor="middle" font-family="Courier New" font-size="20">9</text>
<text x="524" y="193" text-anchor="middle" font-family="Courier New" font-size="20">8</text>
<text x="597" y="193" text-anchor="middle" font-family="Courier New" font-size="20">7</text>

<text x="451" y="266" text-anchor="middle" font-family="Courier New" font-size="20">6</text>
<text x="524" y="266" text-anchor="middle" font-family="Courier New" font-size="20">5</text>
<text x="597" y="266" text-anchor="middle" font-family="Courier New" font-size="20">4</text>

<text x="451" y="339" text-anchor="middle" font-family="Courier New" font-size="20">3</text>
<text x="524" y="339" text-anchor="middle" font-family="Courier New" font-size="20">2</text>
<text x="597" y="339" text-anchor="middle" font-family="Courier New" font-size="20">1</text>

<!-- Highlight Column -->

<rect x="415" y="150" width="73" height="220" fill="#FBBF24" opacity="0.35"></rect>

<!-- ================= EQUALS ================= -->

<text x="700" y="280" text-anchor="middle" font-family="Arial" font-size="44" font-weight="bold">
=
</text>

<!-- ================= RESULT ================= -->

<text x="1010" y="120" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Result Matrix
</text>

<rect x="820" y="150" width="320" height="220" fill="#EEFDF3" stroke="#16A34A" stroke-width="2"></rect>

<text x="980" y="195" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold">
Top-left cell
</text>

<text x="980" y="240" text-anchor="middle" font-family="Courier New" font-size="20">
1×9 + 2×6 + 3×3
</text>

<text x="980" y="280" text-anchor="middle" font-family="Courier New" font-size="22">
= 30
</text>

<line x1="840" y1="315" x2="1120" y2="315" stroke="#CCCCCC"></line>

<text x="980" y="350" text-anchor="middle" font-family="Arial" font-size="17">
Repeat Row × Column
</text>

<!-- ================= FLOW ================= -->

<line x1="170" y1="410" x2="980" y2="410" stroke="#444" stroke-width="2" stroke-dasharray="8,6"></line>

<text x="575" y="445" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold">
One Row × One Column → One Output Cell
</text>

<!-- ================= FOOTER ================= -->

<rect x="80" y="685" width="1090" height="42" fill="#F3F4F6" stroke="#999"></rect>

<text x="625" y="710" text-anchor="middle" font-family="Arial" font-size="15">
Matrix multiplication is NOT element-wise multiplication. Every value in the result is a dot product between a row of Matrix A and a column of Matrix B.
</text>

</svg>