<svg width="600" height="150" xmlns="http://www.w3.org/2000/svg">
  <!-- Full DataFrame Base -->
  <rect x="50" y="20" width="200" height="120" fill="#2d3436" rx="5"/>
  <line x1="50" y1="40" x2="250" y2="40" stroke="#636e72" stroke-width="2"/>
  <line x1="50" y1="60" x2="250" y2="60" stroke="#636e72" stroke-width="2"/>
  <line x1="50" y1="80" x2="250" y2="80" stroke="#636e72" stroke-width="2"/>
  <line x1="50" y1="100" x2="250" y2="100" stroke="#636e72" stroke-width="2"/>
  
  <!-- Highlight Top 3 -->
  <rect x="45" y="15" width="210" height="70" fill="none" stroke="#00cec9" stroke-width="4" rx="5" stroke-dasharray="6"/>
  <text x="320" y="55" fill="#00cec9" font-family="monospace" font-weight="bold" font-size="20">.head(3)</text>
  
  <path d="M 260 50 L 300 50" stroke="#00cec9" stroke-width="3" marker-end="url(#arrow)"/>
  
  <text x="320" y="80" fill="#dfe6e9" font-family="sans-serif" font-size="12">Returns an instant O(1) View</text>
  <text x="320" y="100" fill="#dfe6e9" font-family="sans-serif" font-size="12">without loading the full table</text>
</svg>
