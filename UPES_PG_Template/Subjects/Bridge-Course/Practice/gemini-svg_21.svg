<svg width="600" height="150" xmlns="http://www.w3.org/2000/svg">
  <rect x="50" y="20" width="500" height="120" rx="10" fill="#2d3436"/>
  
  <!-- Right Triangle (Quad) -->
  <polygon points="100,100 200,100 100,30" fill="#0984e3" stroke="#74b9ff" stroke-width="2"/>
  <text x="140" y="115" fill="#dfe6e9" font-size="12" text-anchor="middle">b = 4</text>
  <text x="80" y="70" fill="#dfe6e9" font-size="12" text-anchor="middle">a = 3</text>
  <text x="160" y="60" fill="#fdcb6e" font-weight="bold" font-size="14" text-anchor="middle">c = 5</text>
  
  <!-- Math Engine -->
  <text x="400" y="55" fill="#00b894" font-family="monospace" font-size="14">import math</text>
  <text x="400" y="80" fill="#dfe6e9" font-family="monospace" font-size="12">math.sqrt(3**2 + 4**2)</text>
  <text x="400" y="105" fill="#fdcb6e" font-family="monospace" font-weight="bold" font-size="14">Output: 5.0</text>
</svg>
