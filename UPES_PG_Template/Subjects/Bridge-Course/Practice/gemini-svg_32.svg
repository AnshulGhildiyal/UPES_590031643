  <circle cx="220" cy="75" r="25" fill="#00b894"/>
  <text x="220" y="80" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">5</text>

  <circle cx="290" cy="75" r="25" fill="#00b894"/>
  <text x="290" y="80" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">5</text>

  <circle cx="360" cy="75" r="25" fill="#00b894"/>
