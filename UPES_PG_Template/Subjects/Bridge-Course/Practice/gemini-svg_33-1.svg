<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#1e293b"/>
</linearGradient>
<linearGradient id="yes" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#22c55e"/>
<stop offset="100%" stop-color="#16a34a"/>
</linearGradient>
<linearGradient id="no" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#ef4444"/>
<stop offset="100%" stop-color="#dc2626"/>
</linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity=".25"/>
</filter>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
<path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
</marker>
</defs>

<rect width="900" height="520" fill="url(#bg)"/>

<text x="450" y="55" text-anchor="middle" font-size="28" font-family="Segoe UI,Arial" fill="white" font-weight="700">
Decision Flow: Multiple of 5
</text>
<text x="450" y="82" text-anchor="middle" font-size="15" font-family="Segoe UI,Arial" fill="#cbd5e1">
Example: num = 37
</text>

<rect x="315" y="115" rx="18" ry="18" width="270" height="70"
 fill="#334155" stroke="#60a5fa" stroke-width="3" filter="url(#shadow)"/>
<text x="450" y="145" text-anchor="middle" fill="white" font-size="20" font-family="Segoe UI,Arial" font-weight="700">
Check
</text>
<text x="450" y="168" text-anchor="middle" fill="#bfdbfe" font-size="18" font-family="Consolas,monospace">
num % 5 == 0 ?
</text>

<line x1="450" y1="185" x2="450" y2="235" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

<line x1="450" y1="235" x2="230" y2="275" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="450" y1="235" x2="670" y2="275" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

<text x="300" y="245" fill="#22c55e" font-size="18" font-weight="700" font-family="Segoe UI">YES</text>
<text x="585" y="245" fill="#ef4444" font-size="18" font-weight="700" font-family="Segoe UI">NO</text>

<rect x="90" y="285" rx="18" width="280" height="120"
 fill="url(#yes)" filter="url(#shadow)"/>
<text x="230" y="325" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="Segoe UI">
Multiple of 5
</text>
<text x="230" y="355" text-anchor="middle" fill="white" font-size="17" font-family="Consolas,monospace">
remainder = 0
</text>
<text x="230" y="382" text-anchor="middle" fill="#ecfdf5" font-size="15" font-family="Segoe UI">
Examples: 10, 25, 100
</text>

<rect x="530" y="285" rx="18" width="280" height="120"
 fill="url(#no)" filter="url(#shadow)"/>
<text x="670" y="325" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="Segoe UI">
Not a Multiple
</text>
<text x="670" y="355" text-anchor="middle" fill="white" font-size="17" font-family="Consolas,monospace">
remainder ≠ 0
</text>
<text x="670" y="382" text-anchor="middle" fill="#fee2e2" font-size="15" font-family="Segoe UI">
37 % 5 = 2
</text>

<rect x="245" y="440" width="410" height="48" rx="12" fill="#1e293b" stroke="#475569"/>
<text x="450" y="471" text-anchor="middle" fill="#f8fafc" font-size="18" font-family="Segoe UI">
37 → remainder 2 → Not a multiple of 5
</text>
</svg>