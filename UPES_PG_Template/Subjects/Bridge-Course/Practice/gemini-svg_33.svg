<svg xmlns="http://www.w3.org/2000/svg" width="700" height="240" viewBox="0 0 700 240">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="currentColor"/>
</marker>
</defs>

<rect x="10" y="10" width="680" height="220" rx="16" fill="#f8fafc" stroke="#d0d7de"/>

<polygon points="350,35 435,90 350,145 265,90" fill="#0984e3"/>
<text x="350" y="95" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">a &gt; b ?</text>

<path d="M290 80 L180 120" stroke="#00b894" stroke-width="3" fill="none" color="#00b894" marker-end="url(#arrow)"/>
<text x="230" y="75" fill="#00b894" font-family="sans-serif" font-size="14" font-weight="bold">True</text>

<rect x="90" y="120" width="140" height="50" rx="8" fill="#00b894"/>
<text x="160" y="151" fill="white" font-family="sans-serif" font-size="16" text-anchor="middle">Print A</text>

<path d="M410 80 L520 120" stroke="#d63031" stroke-width="3" fill="none" color="#d63031" marker-end="url(#arrow)"/>
<text x="470" y="75" fill="#d63031" font-family="sans-serif" font-size="14" font-weight="bold">False</text>

<rect x="470" y="120" width="160" height="50" rx="8" fill="#636e72"/>
<text x="550" y="151" fill="white" font-family="sans-serif" font-size="16" text-anchor="middle">Check b &gt; a</text>

<text x="350" y="210" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#555">
Decision flow for comparing two numbers
</text>
</svg>