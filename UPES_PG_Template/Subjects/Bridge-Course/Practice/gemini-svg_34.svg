<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#1e293b"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity=".25"/></filter>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
<path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
</marker>
</defs>

<rect width="960" height="560" fill="url(#bg)"/>

<text x="480" y="45" text-anchor="middle" fill="white" font-size="28" font-family="Segoe UI" font-weight="700">
Algorithm Showdown
</text>
<text x="480" y="72" text-anchor="middle" fill="#cbd5e1" font-size="16" font-family="Segoe UI">
Project Vegapunk — Which trading model has the highest ROI?
</text>

<!-- Model cards -->
<g filter="url(#shadow)">
<rect x="80" y="120" rx="18" width="220" height="120" fill="#2563eb"/>
<rect x="370" y="120" rx="18" width="220" height="120" fill="#7c3aed"/>
<rect x="660" y="120" rx="18" width="220" height="120" fill="#ea580c"/>
</g>

<text x="190" y="165" text-anchor="middle" fill="white" font-size="22" font-family="Segoe UI" font-weight="700">Model A</text>
<text x="190" y="205" text-anchor="middle" fill="#dbeafe" font-size="34" font-family="Consolas">12%</text>

<text x="480" y="165" text-anchor="middle" fill="white" font-size="22" font-family="Segoe UI" font-weight="700">Model B</text>
<text x="480" y="205" text-anchor="middle" fill="#ede9fe" font-size="34" font-family="Consolas">45%</text>

<text x="770" y="165" text-anchor="middle" fill="white" font-size="22" font-family="Segoe UI" font-weight="700">Model C</text>
<text x="770" y="205" text-anchor="middle" fill="#ffedd5" font-size="34" font-family="Consolas">32%</text>

<!-- arrows -->
<line x1="190" y1="240" x2="480" y2="315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="770" y1="240" x2="480" y2="315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="480" y1="240" x2="480" y2="315" stroke="#22c55e" stroke-width="4" marker-end="url(#arrow)"/>

<rect x="270" y="320" width="420" height="120" rx="22" fill="#14532d" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
<text x="480" y="360" text-anchor="middle" fill="white" font-size="26" font-family="Segoe UI" font-weight="700">Winner 🏆</text>
<text x="480" y="395" text-anchor="middle" fill="#dcfce7" font-size="22" font-family="Segoe UI">
Model B beats Model A and Model C
</text>
<text x="480" y="425" text-anchor="middle" fill="white" font-size="28" font-family="Consolas">
45% ROI
</text>

<rect x="120" y="470" width="720" height="52" rx="12" fill="#1e293b" stroke="#475569"/>
<text x="480" y="502" text-anchor="middle" fill="#f8fafc" font-size="18" font-family="Segoe UI">
Python logic: if A wins → elif B wins → else C wins
</text>
</svg>