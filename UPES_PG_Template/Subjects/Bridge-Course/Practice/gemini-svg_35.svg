<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0b1020"/>
<stop offset="100%" stop-color="#172554"/>
</linearGradient>
<linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#38bdf8"/>
<stop offset="100%" stop-color="#2563eb"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".3"/></filter>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
<path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
</marker>
</defs>

<rect width="1000" height="620" fill="url(#bg)"/>

<text x="500" y="48" text-anchor="middle" fill="white" font-size="30" font-family="Segoe UI" font-weight="700">
Physics Lab Simulator
</text>
<text x="500" y="76" text-anchor="middle" fill="#cbd5e1" font-size="17" font-family="Segoe UI">
Quadratic Equation • The Discriminant Decides Reality
</text>

<!-- Formula -->
<rect x="250" y="95" width="500" height="70" rx="18" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
<text x="500" y="138" text-anchor="middle" fill="#e2e8f0" font-family="Consolas" font-size="24">
Δ = b² − 4ac = 4 − 20 = −16
</text>

<line x1="500" y1="165" x2="500" y2="220" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

<!-- Decision -->
<rect x="370" y="220" width="260" height="70" rx="16" fill="#334155" stroke="#a78bfa" stroke-width="3" filter="url(#shadow)"/>
<text x="500" y="248" text-anchor="middle" fill="white" font-size="20" font-family="Segoe UI" font-weight="700">
Is Δ ≥ 0 ?
</text>
<text x="500" y="272" text-anchor="middle" fill="#cbd5e1" font-size="16" font-family="Segoe UI">
Reality Check
</text>

<line x1="370" y1="290" x2="180" y2="360" stroke="#22c55e" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="630" y1="290" x2="820" y2="360" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow)"/>

<text x="285" y="318" fill="#22c55e" font-size="18" font-weight="700" font-family="Segoe UI">YES</text>
<text x="680" y="318" fill="#ef4444" font-size="18" font-weight="700" font-family="Segoe UI">NO</text>

<!-- Real -->
<rect x="40" y="360" width="320" height="180" rx="22" fill="#14532d" stroke="#22c55e" stroke-width="3"/>
<text x="200" y="398" text-anchor="middle" fill="white" font-size="24" font-weight="700" font-family="Segoe UI">Real Roots</text>
<path d="M80 500 Q200 290 320 500" fill="none" stroke="#bbf7d0" stroke-width="4"/>
<line x1="80" y1="500" x2="320" y2="500" stroke="#f8fafc" stroke-width="2"/>
<circle cx="130" cy="458" r="5" fill="#fff"/>
<circle cx="270" cy="458" r="5" fill="#fff"/>
<text x="200" y="530" text-anchor="middle" fill="#dcfce7" font-size="15" font-family="Segoe UI">
Trajectory touches the ground
</text>

<!-- Imaginary -->
<rect x="640" y="360" width="320" height="180" rx="22" fill="#312e81" stroke="#818cf8" stroke-width="3"/>
<text x="800" y="398" text-anchor="middle" fill="white" font-size="24" font-weight="700" font-family="Segoe UI">Imaginary Roots</text>
<path d="M680 500 Q800 340 920 500" fill="none" stroke="#c4b5fd" stroke-width="4" stroke-dasharray="8 6"/>
<line x1="680" y1="500" x2="920" y2="500" stroke="#f8fafc" stroke-width="2"/>
<text x="800" y="450" text-anchor="middle" fill="#ddd6fe" font-size="18" font-family="Consolas">
-1 + 2j
</text>
<text x="800" y="475" text-anchor="middle" fill="#ddd6fe" font-size="18" font-family="Consolas">
-1 - 2j
</text>
<text x="800" y="530" text-anchor="middle" fill="#e9d5ff" font-size="15" font-family="Segoe UI">
Trajectory never reaches y = 0
</text>

<rect x="270" y="565" width="460" height="36" rx="10" fill="#0f172a" stroke="#475569"/>
<text x="500" y="588" text-anchor="middle" fill="#f8fafc" font-size="16" font-family="Segoe UI">
Use cmath.sqrt() because math.sqrt() cannot handle negative discriminants.
</text>
</svg>