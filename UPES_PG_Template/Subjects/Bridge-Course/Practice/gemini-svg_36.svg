<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#1e3a8a"/>
</linearGradient>
<linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1e293b"/>
<stop offset="100%" stop-color="#334155"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".25"/></filter>
</defs>

<rect width="1000" height="620" fill="url(#bg)"/>

<text x="500" y="50" text-anchor="middle" font-size="30" fill="white"
font-family="Segoe UI" font-weight="700">
Leap Year Checker
</text>

<text x="500" y="78" text-anchor="middle" font-size="16" fill="#cbd5e1"
font-family="Segoe UI">
Don't reinvent the calendar — let Python do it.
</text>

<!-- Calendar -->
<g filter="url(#shadow)">
<rect x="90" y="120" width="320" height="360" rx="22" fill="url(#card)" stroke="#60a5fa" stroke-width="3"/>
<rect x="90" y="120" width="320" height="70" rx="22" fill="#2563eb"/>
<text x="250" y="165" text-anchor="middle" fill="white" font-size="28" font-family="Segoe UI" font-weight="700">2024</text>

<!-- Week labels -->
<g font-family="Segoe UI" font-size="14" fill="#94a3b8" text-anchor="middle">
<text x="125" y="220">S</text><text x="165" y="220">M</text><text x="205" y="220">T</text>
<text x="245" y="220">W</text><text x="285" y="220">T</text><text x="325" y="220">F</text><text x="365" y="220">S</text>
</g>

<!-- Grid -->
<g font-family="Consolas" font-size="16" text-anchor="middle">
<text x="125" y="255" fill="#e2e8f0">1</text><text x="165" y="255" fill="#e2e8f0">2</text><text x="205" y="255" fill="#e2e8f0">3</text><text x="245" y="255" fill="#e2e8f0">4</text><text x="285" y="255" fill="#e2e8f0">5</text><text x="325" y="255" fill="#e2e8f0">6</text><text x="365" y="255" fill="#e2e8f0">7</text><text x="125" y="297" fill="#e2e8f0">8</text><text x="165" y="297" fill="#e2e8f0">9</text><text x="205" y="297" fill="#e2e8f0">10</text><text x="245" y="297" fill="#e2e8f0">11</text><text x="285" y="297" fill="#e2e8f0">12</text><text x="325" y="297" fill="#e2e8f0">13</text><text x="365" y="297" fill="#e2e8f0">14</text><text x="125" y="339" fill="#e2e8f0">15</text><text x="165" y="339" fill="#e2e8f0">16</text><text x="205" y="339" fill="#e2e8f0">17</text><text x="245" y="339" fill="#e2e8f0">18</text><text x="285" y="339" fill="#e2e8f0">19</text><text x="325" y="339" fill="#e2e8f0">20</text><text x="365" y="339" fill="#e2e8f0">21</text><text x="125" y="381" fill="#e2e8f0">22</text><text x="165" y="381" fill="#e2e8f0">23</text><text x="205" y="381" fill="#e2e8f0">24</text><text x="245" y="381" fill="#e2e8f0">25</text><text x="285" y="381" fill="#e2e8f0">26</text><text x="325" y="381" fill="#e2e8f0">27</text><text x="365" y="381" fill="#e2e8f0">28</text><circle cx="125" cy="418" r="17" fill="#22c55e"/><text x="125" y="423" fill="white">29</text><text x="165" y="423" fill="#e2e8f0">30</text><text x="205" y="423" fill="#e2e8f0">31</text>
</g>

<text x="250" y="455" text-anchor="middle" fill="#bbf7d0" font-size="18"
font-family="Segoe UI" font-weight="700">
✓ February has 29 days
</text>
</g>

<!-- Code -->
<g filter="url(#shadow)">
<rect x="500" y="120" width="410" height="250" rx="18" fill="#111827" stroke="#475569"/>
<text x="525" y="155" fill="#22c55e" font-family="Consolas" font-size="20">import calendar</text>
<text x="525" y="195" fill="#e5e7eb" font-family="Consolas" font-size="19">year = 2024</text>
<text x="525" y="235" fill="#60a5fa" font-family="Consolas" font-size="19">if calendar.isleap(year):</text>
<text x="555" y="270" fill="#e5e7eb" font-family="Consolas" font-size="18">print("Leap Year")</text>
<text x="525" y="310" fill="#60a5fa" font-family="Consolas" font-size="19">else:</text>
<text x="555" y="345" fill="#e5e7eb" font-family="Consolas" font-size="18">print("Not a Leap Year")</text>
</g>

<!-- Tip -->
<rect x="500" y="400" width="410" height="95" rx="18" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
<text x="705" y="435" text-anchor="middle" fill="white" font-size="22" font-family="Segoe UI" font-weight="700">
Professional Tip
</text>
<text x="705" y="463" text-anchor="middle" fill="#dcfce7" font-size="16" font-family="Segoe UI">
Use calendar.isleap() instead of manually implementing
</text>
<text x="705" y="485" text-anchor="middle" fill="#dcfce7" font-size="16" font-family="Segoe UI">
the Gregorian Calendar rules.
</text>

<rect x="160" y="525" width="680" height="48" rx="12" fill="#1e293b" stroke="#64748b"/>
<text x="500" y="555" text-anchor="middle" fill="#f8fafc" font-size="18" font-family="Segoe UI">
Built-in libraries reduce bugs and improve readability.
</text>

</svg>