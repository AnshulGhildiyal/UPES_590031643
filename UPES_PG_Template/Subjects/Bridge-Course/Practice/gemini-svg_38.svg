<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#1e3a8a"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".25"/></filter>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
<path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
</marker>
</defs>

<rect width="1100" height="620" fill="url(#bg)"/>

<text x="550" y="50" text-anchor="middle" fill="white"
font-size="30" font-family="Segoe UI" font-weight="700">
Production Architecture: Configuration over Hardcoding
</text>

<text x="550" y="80" text-anchor="middle" fill="#cbd5e1"
font-size="16" font-family="Segoe UI">
Business Rules (Data) are separated from Business Logic (Code)
</text>

<!-- Config -->
<rect x="70" y="130" width="320" height="360" rx="18"
fill="#1e293b" stroke="#38bdf8" stroke-width="3" filter="url(#shadow)"/>

<text x="230" y="165" text-anchor="middle" fill="#7dd3fc"
font-size="22" font-family="Segoe UI" font-weight="700">
grading_rules.json
</text>

<rect x="95" y="190" width="270" height="250" rx="12" fill="#111827"/>

<text x="110" y="220" fill="#a7f3d0" font-family="Consolas" font-size="15">
[
</text>
<text x="125" y="245" fill="#e5e7eb" font-family="Consolas" font-size="15">
{"min": 9.1, "grade": "O"}
</text>
<text x="125" y="270" fill="#e5e7eb" font-family="Consolas" font-size="15">
{"min": 8.1, "grade": "A+"}
</text>
<text x="125" y="295" fill="#e5e7eb" font-family="Consolas" font-size="15">
{"min": 7.1, "grade": "A"}
</text>
<text x="125" y="320" fill="#94a3b8" font-family="Consolas" font-size="15">
...
</text>
<text x="110" y="350" fill="#a7f3d0" font-family="Consolas" font-size="15">
]
</text>

<text x="230" y="470" text-anchor="middle" fill="#bfdbfe"
font-size="16" font-family="Segoe UI">
Update this file when policies change
</text>

<!-- arrows -->
<line x1="390" y1="310" x2="520" y2="310"
stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

<!-- Engine -->
<rect x="520" y="170" width="260" height="280" rx="18"
fill="#14532d" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>

<text x="650" y="210" text-anchor="middle" fill="white"
font-size="24" font-family="Segoe UI" font-weight="700">
get_grade()
</text>

<rect x="555" y="235" width="190" height="120" rx="10"
fill="#052e16"/>

<text x="570" y="260" fill="#dcfce7"
font-size="15" font-family="Consolas">
for rule in rules:
</text>
<text x="585" y="285" fill="#dcfce7"
font-size="15" font-family="Consolas">
if cgpa >= rule["min"]:
</text>
<text x="600" y="310" fill="#dcfce7"
font-size="15" font-family="Consolas">
return rule["grade"]
</text>

<text x="650" y="390" text-anchor="middle"
fill="#bbf7d0" font-size="17" font-family="Segoe UI">
Logic never changes
</text>

<line x1="780" y1="310" x2="920" y2="310"
stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

<!-- Result -->
<rect x="920" y="180" width="140" height="260" rx="18"
fill="#7c2d12" stroke="#fb923c" stroke-width="3" filter="url(#shadow)"/>

<text x="990" y="220" text-anchor="middle"
fill="white" font-size="22" font-family="Segoe UI" font-weight="700">
Student
</text>

<text x="990" y="270" text-anchor="middle"
fill="#ffedd5" font-size="34" font-family="Consolas">
7.6
</text>

<text x="990" y="340" text-anchor="middle"
fill="#fde68a" font-size="42" font-family="Segoe UI" font-weight="700">
A
</text>

<text x="990" y="390" text-anchor="middle"
fill="#fed7aa" font-size="15" font-family="Segoe UI">
Calculated Grade
</text>

<!-- footer -->
<rect x="120" y="535" width="860" height="50" rx="12"
fill="#111827" stroke="#475569"/>

<text x="550" y="567" text-anchor="middle"
fill="#f8fafc" font-size="18" font-family="Segoe UI">
Change the grading policy? ✔ Update the configuration file, not the algorithm.
</text>

</svg>