<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/>
</linearGradient>
</defs>
<rect width="1000" height="620" fill="url(#bg)"/>

<text x="500" y="42" text-anchor="middle" fill="white" font-family="Arial" font-size="30" font-weight="bold">CLI Dashboard Alignment</text>
<text x="500" y="68" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="16">Using f-string format specifiers keeps columns perfectly aligned.</text>

<rect x="50" y="100" width="400" height="430" rx="12" fill="#111827" stroke="#475569" stroke-width="2"/>
<text x="250" y="135" text-anchor="middle" fill="white" font-family="Arial" font-size="20" font-weight="bold">Without Formatting</text>

<g font-family="Courier New" font-size="18" fill="#fca5a5">
<text x="70" y="180">| 5 x 1 = 5 |</text>
<text x="70" y="210">| 5 x 2 = 10 |</text>
<text x="70" y="240">| 5 x 3 = 15 |</text>
<text x="70" y="270">| 5 x 10 = 50 |</text>
</g>
<line x1="60" y1="300" x2="440" y2="300" stroke="#374151"/>
<text x="250" y="340" text-anchor="middle" fill="#fbbf24" font-family="Arial" font-size="18">Columns shift as numbers grow</text>

<rect x="550" y="100" width="400" height="430" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2"/>
<text x="750" y="135" text-anchor="middle" fill="white" font-family="Arial" font-size="20" font-weight="bold">With &lt;2 and &lt;3 Formatting</text>

<!-- guide lines kept within text area -->
<line x1="675" y1="160" x2="675" y2="285" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="775" y1="160" x2="775" y2="285" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="880" y1="160" x2="880" y2="285" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 4"/>

<g font-family="Courier New" font-size="18" fill="#bbf7d0">
<text x="570" y="180">|  5  x  1   =  5   |</text>
<text x="570" y="210">|  5  x  2   =  10  |</text>
<text x="570" y="240">|  5  x  3   =  15  |</text>
<text x="570" y="270">|  5  x 10   =  50  |</text>
</g>

<text x="750" y="340" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="18">Every column stays aligned ✓</text>

<rect x="110" y="560" width="780" height="38" rx="8" fill="#0b1220" stroke="#475569"/>
<text x="500" y="584" text-anchor="middle" fill="#e5e7eb" font-family="Courier New" font-size="15">f"{i:&lt;2}" reserves 2 spaces • f"{num*i:&lt;3}" reserves 3 spaces</text>
</svg>
