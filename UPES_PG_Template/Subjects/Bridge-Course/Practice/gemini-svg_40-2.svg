<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
<rect width="1000" height="600" fill="#111827"/>
<text x="500" y="40" text-anchor="middle" fill="white" font-family="Arial" font-size="28" font-weight="bold">CLI Dashboard Alignment</text>
<text x="500" y="65" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">Why f-string width specifiers matter</text>

<rect x="45" y="95" width="400" height="420" rx="10" fill="#1f2937" stroke="#64748b"/>
<rect x="555" y="95" width="400" height="420" rx="10" fill="#1f2937" stroke="#22c55e"/>

<text x="245" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="20" font-weight="bold">Without Formatting</text>
<text x="755" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="20" font-weight="bold">With &lt;2 and &lt;3</text>
<text x="70" y="180" fill="#fca5a5" font-family="Courier New, monospace" font-size="20" xml:space="preserve">| 5 x 1 = 5 |</text><text x="70" y="220" fill="#fca5a5" font-family="Courier New, monospace" font-size="20" xml:space="preserve">| 5 x 2 = 10 |</text><text x="70" y="260" fill="#fca5a5" font-family="Courier New, monospace" font-size="20" xml:space="preserve">| 5 x 3 = 15 |</text><text x="70" y="300" fill="#fca5a5" font-family="Courier New, monospace" font-size="20" xml:space="preserve">| 5 x 10 = 50 |</text><text x="245" y="350" text-anchor="middle" fill="#fbbf24" font-family="Arial" font-size="18">Different widths shift the "=" and result columns.</text><text x="580" y="180" fill="#bbf7d0" font-family="Courier New, monospace" font-size="20" xml:space="preserve">|  5  x  1   =  5   |</text><text x="580" y="220" fill="#bbf7d0" font-family="Courier New, monospace" font-size="20" xml:space="preserve">|  5  x  2   = 10   |</text><text x="580" y="260" fill="#bbf7d0" font-family="Courier New, monospace" font-size="20" xml:space="preserve">|  5  x  3   = 15   |</text><text x="580" y="300" fill="#bbf7d0" font-family="Courier New, monospace" font-size="20" xml:space="preserve">|  5  x 10   = 50   |</text><line x1="700" y1="150" x2="700" y2="315" stroke="#60a5fa" stroke-dasharray="4 4"/><line x1="772" y1="150" x2="772" y2="315" stroke="#60a5fa" stroke-dasharray="4 4"/><line x1="844" y1="150" x2="844" y2="315" stroke="#60a5fa" stroke-dasharray="4 4"/><text x="755" y="350" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="18">Each column starts at the same position.</text><rect x="120" y="540" width="760" height="36" rx="6" fill="#0b1220" stroke="#475569"/>
<text x="500" y="563" text-anchor="middle" fill="#e5e7eb" font-family="Courier New, monospace" font-size="15" xml:space="preserve">f"{i:&lt;2}" reserves 2 characters    •    f"{num*i:&lt;3}" reserves 3 characters</text>
</svg>