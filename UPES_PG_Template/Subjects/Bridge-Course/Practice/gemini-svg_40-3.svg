<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540">
<rect width="980" height="540" fill="#111827"/>
<rect x="30" y="70" width="400" height="400" rx="10" fill="#1f2937" stroke="#64748b"/>
<rect x="550" y="70" width="400" height="400" rx="10" fill="#1f2937" stroke="#22c55e"/>
<text x="230" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="20" font-weight="bold">Without Formatting</text>
<text x="750" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="20" font-weight="bold">With Formatting (&lt;2, &lt;3)</text>
<text x="55" y="150" fill="#fca5a5" font-family="monospace" font-size="18" xml:space="preserve">| 5 x 1 = 5 |</text><text x="55" y="185" fill="#fca5a5" font-family="monospace" font-size="18" xml:space="preserve">| 5 x 2 = 10 |</text><text x="55" y="220" fill="#fca5a5" font-family="monospace" font-size="18" xml:space="preserve">| 5 x 3 = 15 |</text><text x="55" y="255" fill="#fca5a5" font-family="monospace" font-size="18" xml:space="preserve">| 5 x 10 = 50 |</text><text x="575" y="150" fill="#bbf7d0" font-family="monospace" font-size="18" xml:space="preserve">|  5  x  1   =  5   |</text><text x="575" y="185" fill="#bbf7d0" font-family="monospace" font-size="18" xml:space="preserve">|  5  x  2   = 10   |</text><text x="575" y="220" fill="#bbf7d0" font-family="monospace" font-size="18" xml:space="preserve">|  5  x  3   = 15   |</text><text x="575" y="255" fill="#bbf7d0" font-family="monospace" font-size="18" xml:space="preserve">|  5  x 10   = 50   |</text><rect x="661.4" y="128" width="28" height="135" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-dasharray="3 3"/><rect x="737.0" y="128" width="36" height="135" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-dasharray="3 3"/><rect x="780.2" y="128" width="42" height="135" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-dasharray="3 3"/><text x="750" y="315" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="18">
Notice how the highlighted columns never move.
</text>
<text x="490" y="510" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="15">
Format specifiers reserve fixed-width spaces, producing neat CLI tables.
</text>
</svg>