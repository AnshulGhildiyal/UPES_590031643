<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
<rect width="980" height="560" fill="#0f172a"/>

<!-- Window -->
<rect x="40" y="40" width="900" height="470" rx="10" fill="#111827" stroke="#4b5563" stroke-width="2"/>
<rect x="40" y="40" width="900" height="42" fill="#1f2937"/>
<circle cx="65" cy="61" r="6" fill="#ef4444"/>
<circle cx="87" cy="61" r="6" fill="#f59e0b"/>
<circle cx="109" cy="61" r="6" fill="#22c55e"/>
<text x="490" y="67" text-anchor="middle" fill="#e5e7eb" font-family="Arial" font-size="18">Terminal Output</text>

<!-- Divider -->
<line x1="490" y1="95" x2="490" y2="480" stroke="#374151" stroke-width="2"/>

<!-- Titles -->
<text x="265" y="125" text-anchor="middle" fill="#60a5fa" font-family="Arial" font-size="22" font-weight="bold">Without Formatting</text>
<text x="715" y="125" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="22" font-weight="bold">With Formatting</text>

<!-- Left side -->
<g font-family="Courier New" font-size="20" fill="#fca5a5">
<text x="80" y="175">5 x 1 = 5</text>
<text x="80" y="215">5 x 2 = 10</text>
<text x="80" y="255">5 x 3 = 15</text>
<text x="80" y="295">5 x 10 = 50</text>
</g>

<!-- Right side table -->
<g font-family="Courier New" font-size="20" fill="#bbf7d0">
<!-- headers -->
<text x="545" y="160">Num</text>
<text x="615" y="160">×</text>
<text x="670" y="160">i</text>
<text x="740" y="160">=</text>
<text x="790" y="160">Result</text>

<!-- grid -->
<line x1="530" y1="170" x2="900" y2="170" stroke="#475569"/>
<line x1="600" y1="145" x2="600" y2="330" stroke="#334155"/>
<line x1="655" y1="145" x2="655" y2="330" stroke="#334155"/>
<line x1="725" y1="145" x2="725" y2="330" stroke="#334155"/>
<line x1="780" y1="145" x2="780" y2="330" stroke="#334155"/>

<!-- row1 -->
<text x="550" y="205">5</text><text x="620" y="205">x</text><text x="675" y="205">1</text><text x="745" y="205">=</text><text x="795" y="205">5</text>
<!-- row2 -->
<text x="550" y="245">5</text><text x="620" y="245">x</text><text x="675" y="245">2</text><text x="745" y="245">=</text><text x="795" y="245">10</text>
<!-- row3 -->
<text x="550" y="285">5</text><text x="620" y="285">x</text><text x="675" y="285">3</text><text x="745" y="285">=</text><text x="795" y="285">15</text>
<!-- row4 -->
<text x="550" y="325">5</text><text x="620" y="325">x</text><text x="675" y="325">10</text><text x="745" y="325">=</text><text x="795" y="325">50</text>
</g>

<text x="265" y="385" text-anchor="middle" fill="#fbbf24" font-family="Arial" font-size="17">Variable-width values make visual scanning harder.</text>
<text x="715" y="385" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="17">Each field occupies a fixed column.</text>

<rect x="120" y="515" width="740" height="28" rx="6" fill="#1f2937" stroke="#475569"/>
<text x="490" y="534" text-anchor="middle" fill="#e5e7eb" font-family="Courier New" font-size="14">f"{i:&lt;2}" and f"{num*i:&lt;3}" reserve fixed-width character spaces.</text>

</svg>