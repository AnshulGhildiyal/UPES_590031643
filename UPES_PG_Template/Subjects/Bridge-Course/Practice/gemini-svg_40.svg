<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1e293b"/>
<stop offset="100%" stop-color="#0f172a"/>
</linearGradient>
</defs>

<rect width="1000" height="620" fill="url(#bg)"/>

<text x="500" y="45" text-anchor="middle"
font-family="Arial" font-size="30" font-weight="bold" fill="white">
CLI Dashboard Alignment
</text>

<text x="500" y="75" text-anchor="middle"
font-family="Arial" font-size="16" fill="#cbd5e1">
Using f-string format specifiers keeps columns perfectly aligned.
</text>

<rect x="60" y="110" width="390" height="420" rx="12"
fill="#111827" stroke="#475569" stroke-width="2"/>

<text x="255" y="145" text-anchor="middle"
font-family="Arial" font-size="20" font-weight="bold" fill="white">
Without Formatting
</text>

<text x="90" y="185" font-family="Courier New" font-size="18" fill="#fca5a5">| 5 x 1 = 5 |</text>
<text x="90" y="215" font-family="Courier New" font-size="18" fill="#fca5a5">| 5 x 2 = 10 |</text>
<text x="90" y="245" font-family="Courier New" font-size="18" fill="#fca5a5">| 5 x 3 = 15 |</text>
<text x="90" y="275" font-family="Courier New" font-size="18" fill="#fca5a5">| 5 x 10 = 50 |</text>

<line x1="70" y1="305" x2="430" y2="305" stroke="#374151"/>

<text x="255" y="345" text-anchor="middle"
font-family="Arial" font-size="18" fill="#fbbf24">
Columns shift as numbers grow
</text>

<rect x="550" y="110" width="390" height="420" rx="12"
fill="#111827" stroke="#22c55e" stroke-width="2"/>

<text x="745" y="145" text-anchor="middle"
font-family="Arial" font-size="20" font-weight="bold" fill="white">
With &lt;2 and &lt;3 Formatting
</text>

<text x="580" y="185" font-family="Courier New" font-size="18" fill="#bbf7d0">|  5  x  1   =  5   |</text>
<text x="580" y="215" font-family="Courier New" font-size="18" fill="#bbf7d0">|  5  x  2   = 10   |</text>
<text x="580" y="245" font-family="Courier New" font-size="18" fill="#bbf7d0">|  5  x  3   = 15   |</text>
<text x="580" y="275" font-family="Courier New" font-size="18" fill="#bbf7d0">|  5  x 10   = 50   |</text>

<line x1="660" y1="165" x2="660" y2="295" stroke="#60a5fa" stroke-dasharray="4 3"/>
<line x1="770" y1="165" x2="770" y2="295" stroke="#60a5fa" stroke-dasharray="4 3"/>
<line x1="865" y1="165" x2="865" y2="295" stroke="#60a5fa" stroke-dasharray="4 3"/>

<text x="745" y="345" text-anchor="middle"
font-family="Arial" font-size="18" fill="#22c55e">
Every column stays aligned ✓
</text>

<rect x="120" y="555" width="760" height="40" rx="8"
fill="#0b1220" stroke="#475569"/>

<text x="500" y="580" text-anchor="middle"
font-family="Courier New" font-size="16" fill="#e5e7eb">
f"{i:&lt;2}" reserves 2 characters • f"{num*i:&lt;3}" reserves 3 characters
</text>

</svg>
