<svg width="600" height="150" xmlns="http://www.w3.org/2000/svg">
  <rect x="50" y="30" width="80" height="60" rx="5" fill="#2d3436"/>
  <text x="90" y="55" fill="#00cec9" font-family="monospace" font-size="14" text-anchor="middle">i = 1</text>
  <text x="90" y="75" fill="white" font-family="monospace" font-size="14" text-anchor="middle">1 * 1 = 1</text>
  
  <path d="M 140 60 L 170 60" stroke="#636e72" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="180" y="30" width="80" height="60" rx="5" fill="#2d3436"/>
  <text x="220" y="55" fill="#00cec9" font-family="monospace" font-size="14" text-anchor="middle">i = 2</text>
  <text x="220" y="75" fill="white" font-family="monospace" font-size="14" text-anchor="middle">1 * 2 = 2</text>

  <path d="M 270 60 L 300 60" stroke="#636e72" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="310" y="30" width="80" height="60" rx="5" fill="#2d3436"/>
  <text x="350" y="55" fill="#00cec9" font-family="monospace" font-size="14" text-anchor="middle">i = 3</text>
  <text x="350" y="75" fill="white" font-family="monospace" font-size="14" text-anchor="middle">2 * 3 = 6</text>

  <text x="430" y="65" fill="#fdcb6e" font-family="sans-serif" font-weight="bold" font-size="24">... = 120</text>
</svg>
