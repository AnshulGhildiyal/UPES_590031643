<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e3a8a"/></linearGradient>
<linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#334155"/></linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".25"/></filter>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/></marker>
</defs>
<rect width="1100" height="620" fill="url(#bg)"/>
<text x="550" y="50" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="30" font-weight="700">Fibonacci Series</text>
<text x="550" y="80" text-anchor="middle" fill="#cbd5e1" font-family="Segoe UI" font-size="17">Every number is the sum of the previous two.</text>
<rect x="285" y="105" width="530" height="60" rx="16" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
<text x="550" y="143" text-anchor="middle" fill="#f8fafc" font-family="Consolas" font-size="22">F(n)=F(n-1)+F(n-2)</text>
<circle cx="80" cy="250" r="35" fill="#2563eb" filter="url(#shadow)"/><text x="80" y="257" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">0</text><circle cx="200" cy="250" r="35" fill="#2563eb" filter="url(#shadow)"/><text x="200" y="257" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">1</text><circle cx="320" cy="250" r="35" fill="#16a34a" filter="url(#shadow)"/><text x="320" y="257" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">1</text><line x1="245" y1="250" x2="282" y2="250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/><text x="265" y="228" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI" font-size="14">0+1</text><circle cx="440" cy="250" r="35" fill="#16a34a" filter="url(#shadow)"/><text x="440" y="257" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">2</text><line x1="365" y1="250" x2="402" y2="250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/><text x="385" y="228" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI" font-size="14">1+1</text><circle cx="560" cy="250" r="35" fill="#16a34a" filter="url(#shadow)"/><text x="560" y="257" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">3</text><line x1="485" y1="250" x2="522" y2="250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/><text x="505" y="228" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI" font-size="14">1+2</text><circle cx="680" cy="250" r="35" fill="#16a34a" filter="url(#shadow)"/><text x="680" y="257" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">5</text><line x1="605" y1="250" x2="642" y2="250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/><text x="625" y="228" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI" font-size="14">2+3</text><circle cx="800" cy="250" r="35" fill="#16a34a" filter="url(#shadow)"/><text x="800" y="257" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">8</text><line x1="725" y1="250" x2="762" y2="250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/><text x="745" y="228" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI" font-size="14">3+5</text><circle cx="920" cy="250" r="35" fill="#16a34a" filter="url(#shadow)"/><text x="920" y="257" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">13</text><line x1="845" y1="250" x2="882" y2="250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/><text x="865" y="228" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI" font-size="14">5+8</text>
<rect x="80" y="360" width="450" height="190" rx="18" fill="#111827" stroke="#475569"/>
<text x="105" y="395" fill="#22c55e" font-family="Consolas" font-size="18">a, b = 0, 1</text>
<text x="105" y="425" fill="#e5e7eb" font-family="Consolas" font-size="18">for _ in range(8):</text>
<text x="135" y="455" fill="#e5e7eb" font-family="Consolas" font-size="18">print(a, end=' ')</text>
<text x="135" y="485" fill="#e5e7eb" font-family="Consolas" font-size="18">a, b = b, a + b</text>

<rect x="600" y="360" width="420" height="190" rx="18" fill="url(#card)" stroke="#38bdf8"/>
<text x="810" y="398" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="24" font-weight="700">How it works</text>
<text x="630" y="435" fill="#e2e8f0" font-family="Segoe UI" font-size="17">• Start with 0 and 1</text>
<text x="630" y="465" fill="#e2e8f0" font-family="Segoe UI" font-size="17">• Add the previous two numbers</text>
<text x="630" y="495" fill="#e2e8f0" font-family="Segoe UI" font-size="17">• Store the new value</text>
<text x="630" y="525" fill="#e2e8f0" font-family="Segoe UI" font-size="17">• Repeat</text>

<rect x="180" y="575" width="740" height="28" rx="8" fill="#0f172a" stroke="#475569"/>
<text x="550" y="594" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="15">0 → 1 → 1 → 2 → 3 → 5 → 8 → 13 → ...</text>
</svg>