<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e3a8a"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity=".25"/></filter>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
<path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
</marker>
</defs>

<rect width="1100" height="620" fill="url(#bg)"/>

<text x="550" y="48" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="30" font-weight="700">
Optimized Prime Check (√n Trick)
</text>

<text x="550" y="78" text-anchor="middle" fill="#cbd5e1" font-family="Segoe UI" font-size="16">
Instead of checking every number up to n, only check divisors up to √n.
</text>

<rect x="60" y="120" width="430" height="420" rx="18" fill="#111827" stroke="#475569"/>

<text x="80" y="155" fill="#22c55e" font-family="Consolas" font-size="18">num = 29</text>
<text x="80" y="190" fill="#e5e7eb" font-family="Consolas" font-size="17">is_prime = True</text>
<text x="80" y="225" fill="#60a5fa" font-family="Consolas" font-size="17">for i in range(2, int(num**0.5)+1):</text>
<text x="105" y="260" fill="#e5e7eb" font-family="Consolas" font-size="17">if num % i == 0:</text>
<text x="130" y="295" fill="#e5e7eb" font-family="Consolas" font-size="17">is_prime = False</text>
<text x="130" y="330" fill="#e5e7eb" font-family="Consolas" font-size="17">break</text>

<line x1="490" y1="320" x2="610" y2="320" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

<rect x="610" y="120" width="430" height="420" rx="18" fill="#1e293b" stroke="#38bdf8"/>

<text x="825" y="160" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="24" font-weight="700">
Checking 29
</text>

<circle cx="690" cy="250" r="34" fill="#2563eb"/>
<text x="690" y="258" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">2</text>

<circle cx="825" cy="250" r="34" fill="#2563eb"/>
<text x="825" y="258" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">3</text>

<circle cx="960" cy="250" r="34" fill="#2563eb"/>
<text x="960" y="258" text-anchor="middle" fill="white" font-family="Consolas" font-size="22">4</text>

<line x1="724" y1="250" x2="791" y2="250" stroke="#94a3b8" stroke-width="3"/>
<line x1="859" y1="250" x2="926" y2="250" stroke="#94a3b8" stroke-width="3"/>

<text x="825" y="315" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI" font-size="18">
√29 ≈ 5.38
</text>
<text x="825" y="345" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI" font-size="17">
Only check 2, 3, 4, 5
</text>
<text x="825" y="380" text-anchor="middle" fill="#22c55e" font-family="Segoe UI" font-size="20" font-weight="700">
No divisor found ✓
</text>

<rect x="690" y="420" width="270" height="65" rx="12" fill="#14532d" stroke="#22c55e"/>
<text x="825" y="460" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="22" font-weight="700">
29 is Prime
</text>

<rect x="140" y="565" width="820" height="34" rx="8" fill="#0f172a" stroke="#475569"/>
<text x="550" y="587" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="15">
Optimization: Any factor larger than √n must pair with a factor smaller than √n, so checking beyond √n is unnecessary.
</text>

</svg>