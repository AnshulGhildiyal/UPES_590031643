<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#1e293b"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity=".25"/></filter>
</defs>

<rect width="900" height="520" fill="url(#bg)"/>

<text x="450" y="48" text-anchor="middle" fill="white"
font-family="Segoe UI" font-size="30" font-weight="700">
Divisible by 5 and 7
</text>
<text x="450" y="76" text-anchor="middle" fill="#cbd5e1"
font-family="Segoe UI" font-size="16">
A number must satisfy BOTH conditions to be in the intersection.
</text>

<circle cx="340" cy="240" r="120"
fill="#3b82f6" fill-opacity="0.55" stroke="#60a5fa" stroke-width="3"/>

<circle cx="560" cy="240" r="120"
fill="#ec4899" fill-opacity="0.55" stroke="#f472b6" stroke-width="3"/>

<text x="280" y="240" text-anchor="middle"
fill="white" font-size="28" font-family="Segoe UI" font-weight="700">
÷ 5
</text>

<text x="620" y="240" text-anchor="middle"
fill="white" font-size="28" font-family="Segoe UI" font-weight="700">
÷ 7
</text>

<text x="450" y="205" text-anchor="middle"
fill="white" font-size="18" font-family="Segoe UI" font-weight="700">
Both Conditions
</text>

<text x="450" y="235" text-anchor="middle"
fill="#fde68a" font-size="30" font-family="Consolas" font-weight="700">
35
</text>

<text x="450" y="265" text-anchor="middle"
fill="#fde68a" font-size="22" font-family="Consolas">
70, 105, 140...
</text>

<rect x="180" y="390" width="540" height="70" rx="16"
fill="#111827" stroke="#475569" filter="url(#shadow)"/>

<text x="450" y="420" text-anchor="middle"
fill="#22c55e" font-size="20" font-family="Consolas">
if num % 5 == 0 and num % 7 == 0
</text>

<text x="450" y="445" text-anchor="middle"
fill="#cbd5e1" font-size="15" font-family="Segoe UI">
The AND operator selects only the overlap (intersection) of both sets.
</text>

</svg>