<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e293b"/>
    <stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>
  <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#16a34a"/>
    <stop offset="100%" stop-color="#22c55e"/>
  </linearGradient>
</defs>

<rect width="1000" height="560" fill="url(#bg)"/>

<text x="500" y="45" text-anchor="middle"
      font-family="Arial" font-size="28"
      font-weight="bold" fill="white">
Lowercase → Uppercase Conversion
</text>

<text x="500" y="72" text-anchor="middle"
      font-family="Arial" font-size="16"
      fill="#cbd5e1">
Python converts lowercase letters by shifting ASCII values by 32.
</text>

<rect x="60" y="110" width="360" height="90"
      rx="12" fill="#1f2937"
      stroke="#60a5fa" stroke-width="2"/>

<text x="240" y="145" text-anchor="middle"
      font-family="Arial" font-size="18"
      fill="#93c5fd">Original</text>

<text x="240" y="178" text-anchor="middle"
      font-family="Courier New" font-size="24"
      fill="#fde68a">Python Programming Lab</text>

<polygon points="470,155 540,155 540,140 600,185 540,230 540,215 470,215"
         fill="url(#green)"/>

<text x="535" y="190" text-anchor="middle"
      font-family="Arial" font-size="18"
      fill="white">upper()</text>

<rect x="640" y="110" width="300" height="90"
      rx="12" fill="#14532d"
      stroke="#22c55e" stroke-width="2"/>

<text x="790" y="145" text-anchor="middle"
      font-family="Arial" font-size="18"
      fill="#bbf7d0">Result</text>

<text x="790" y="178" text-anchor="middle"
      font-family="Courier New" font-size="24"
      fill="white">PYTHON PROGRAMMING LAB</text>

<rect x="60" y="250" width="880" height="240"
      rx="12" fill="#111827"
      stroke="#475569" stroke-width="2"/>

<text x="500" y="285" text-anchor="middle"
      font-family="Arial" font-size="22"
      font-weight="bold" fill="white">
ASCII Conversion (Manual Loop)
</text>

<text x="150" y="345" font-family="Courier New" font-size="26" fill="#fde68a">'p'</text>
<text x="240" y="345" font-family="Courier New" font-size="26" fill="#60a5fa">112</text>
<text x="335" y="345" font-family="Arial" font-size="26" fill="#f87171">−32</text>
<text x="430" y="345" font-family="Arial" font-size="26" fill="#cbd5e1">=</text>
<text x="490" y="345" font-family="Courier New" font-size="26" fill="#22c55e">80</text>
<text x="580" y="345" font-family="Courier New" font-size="26" fill="#bbf7d0">'P'</text>

<line x1="120" y1="365" x2="860" y2="365" stroke="#475569" stroke-width="1"/>

<text x="120" y="410" font-family="Arial" font-size="18" fill="#e5e7eb">
Lowercase ASCII:
</text>
<text x="310" y="410" font-family="Courier New" font-size="18" fill="#60a5fa">
97 ('a') → 122 ('z')
</text>

<text x="120" y="445" font-family="Arial" font-size="18" fill="#e5e7eb">
Uppercase ASCII:
</text>
<text x="310" y="445" font-family="Courier New" font-size="18" fill="#22c55e">
65 ('A') → 90 ('Z')
</text>

<text x="680" y="410" font-family="Arial" font-size="18" fill="#fde68a">
Difference = 32
</text>

<text x="680" y="445" font-family="Arial" font-size="18" fill="#cbd5e1">
!, @, 1, ? stay unchanged
</text>

<text x="500" y="530" text-anchor="middle"
      font-family="Arial" font-size="15"
      fill="#cbd5e1">
Strings are immutable: upper() returns a new string without modifying the original.
</text>

</svg>
