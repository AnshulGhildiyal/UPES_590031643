<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#312e81"/>
</linearGradient>
<linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1e293b"/>
<stop offset="100%" stop-color="#334155"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".25"/></filter>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
<path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
</marker>
</defs>

<rect width="1100" height="650" fill="url(#bg)"/>

<text x="550" y="48" text-anchor="middle" fill="white"
font-family="Segoe UI" font-size="30" font-weight="700">
Lowercase → Uppercase
</text>

<text x="550" y="78" text-anchor="middle" fill="#cbd5e1"
font-family="Segoe UI" font-size="17">
Python's upper() loops through characters and converts lowercase ASCII letters.
</text>

<!-- Input -->
<rect x="60" y="120" width="430" height="150" rx="18"
fill="url(#card)" stroke="#60a5fa" filter="url(#shadow)"/>
<text x="275" y="155" text-anchor="middle" fill="white"
font-family="Segoe UI" font-size="22" font-weight="700">Input String</text>
<text x="275" y="215" text-anchor="middle" fill="#fbbf24"
font-family="Consolas" font-size="26">
Python Programming Lab
</text>

<!-- Arrow -->
<line x1="490" y1="195" x2="610" y2="195" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

<!-- Output -->
<rect x="610" y="120" width="430" height="150" rx="18"
fill="#14532d" stroke="#22c55e" filter="url(#shadow)"/>
<text x="825" y="155" text-anchor="middle" fill="white"
font-family="Segoe UI" font-size="22" font-weight="700">Output String</text>
<text x="825" y="215" text-anchor="middle" fill="#dcfce7"
font-family="Consolas" font-size="26">
PYTHON PROGRAMMING LAB
</text>

<!-- ASCII -->
<rect x="90" y="330" width="920" height="220" rx="20"
fill="#111827" stroke="#475569" filter="url(#shadow)"/>

<text x="550" y="365" text-anchor="middle" fill="white"
font-family="Segoe UI" font-size="24" font-weight="700">
What happens internally?
</text>

<text x="140" y="420" fill="#e5e7eb" font-family="Consolas" font-size="22">
'p'
</text>
<text x="200" y="420" fill="#60a5fa" font-family="Consolas" font-size="22">
ASCII 112
</text>
<text x="360" y="420" fill="#f87171" font-family="Consolas" font-size="22">
− 32
</text>
<text x="470" y="420" fill="#94a3b8" font-family="Consolas" font-size="22">
=
</text>
<text x="530" y="420" fill="#22c55e" font-family="Consolas" font-size="22">
ASCII 80
</text>
<text x="690" y="420" fill="#fbbf24" font-family="Consolas" font-size="22">
'P'
</text>

<line x1="130" y1="445" x2="760" y2="445" stroke="#475569" stroke-dasharray="6 4"/>

<text x="140" y="485" fill="#e2e8f0" font-family="Segoe UI" font-size="18">
Lowercase letters:
</text>
<text x="320" y="485" fill="#60a5fa" font-family="Consolas" font-size="18">
97 ('a') → 122 ('z')
</text>

<text x="140" y="520" fill="#e2e8f0" font-family="Segoe UI" font-size="18">
Uppercase letters:
</text>
<text x="320" y="520" fill="#22c55e" font-family="Consolas" font-size="18">
65 ('A') → 90 ('Z')
</text>

<text x="690" y="505" fill="#fde68a" font-family="Segoe UI" font-size="18">
Difference = 32
</text>

<rect x="700" y="365" width="270" height="70" rx="12"
fill="#0f766e"/>
<text x="835" y="395" text-anchor="middle" fill="white"
font-family="Segoe UI" font-size="18" font-weight="700">
Numbers & Symbols
</text>
<text x="835" y="420" text-anchor="middle" fill="#ccfbf1"
font-family="Consolas" font-size="18">
!, @, 1, ?  → unchanged
</text>

<rect x="170" y="585" width="760" height="34" rx="8"
fill="#0f172a" stroke="#475569"/>
<text x="550" y="607" text-anchor="middle" fill="#f8fafc"
font-family="Segoe UI" font-size="15">
Strings are immutable: upper() returns a new string instead of modifying the original.
</text>

</svg>
