<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1e293b"/>
<stop offset="100%" stop-color="#0f172a"/>
</linearGradient>
</defs>

<rect width="1100" height="650" fill="url(#bg)"/>

<text x="550" y="45" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold" fill="white">
Sieve of Eratosthenes
</text>
<text x="550" y="75" text-anchor="middle" font-family="Arial" font-size="16" fill="#cbd5e1">
Instead of testing every number individually, eliminate multiples and keep only primes.
</text>

<!-- Step cards -->
<rect x="40" y="110" width="240" height="90" rx="10" fill="#1f2937" stroke="#60a5fa" stroke-width="2"/>
<text x="160" y="145" text-anchor="middle" fill="white" font-size="20" font-family="Arial">Step 1</text>
<text x="160" y="175" text-anchor="middle" fill="#fde68a" font-size="16" font-family="Arial">Assume every number is prime</text>

<rect x="430" y="110" width="240" height="90" rx="10" fill="#1f2937" stroke="#22c55e" stroke-width="2"/>
<text x="550" y="145" text-anchor="middle" fill="white" font-size="20" font-family="Arial">Step 2</text>
<text x="550" y="175" text-anchor="middle" fill="#bbf7d0" font-size="16" font-family="Arial">Cross out multiples of 2, 3, 5...</text>

<rect x="820" y="110" width="240" height="90" rx="10" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
<text x="940" y="145" text-anchor="middle" fill="white" font-size="20" font-family="Arial">Step 3</text>
<text x="940" y="175" text-anchor="middle" fill="#fde68a" font-size="16" font-family="Arial">Remaining numbers are prime</text>

<!-- Number grid -->
<text x="550" y="245" text-anchor="middle" fill="white" font-size="22" font-family="Arial" font-weight="bold">
Example: Generate primes up to 30
</text>
