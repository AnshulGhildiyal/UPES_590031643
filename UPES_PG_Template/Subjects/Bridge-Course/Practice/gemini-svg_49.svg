<text x="110" y="550" font-family="Courier New" font-size="18" fill="#22c55e">
for p in range(2, √limit):
</text>
<text x="140" y="578" font-family="Courier New" font-size="18" fill="#e5e7eb">
mark p², p²+p, p²+2p ... as non-prime
</text>

<text x="550" y="635" text-anchor="middle" font-family="Arial" font-size="15" fill="#cbd5e1">
Green = Prime • Red X = Eliminated multiple • Time Complexity: O(n log log n)
</text>

