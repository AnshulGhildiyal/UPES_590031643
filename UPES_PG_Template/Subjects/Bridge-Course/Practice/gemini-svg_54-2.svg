<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
<rect width="1000" height="560" fill="white"/>

<text x="500" y="35" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold">
How Regex Lookahead Works
</text>

<text x="500" y="60" text-anchor="middle" font-family="Arial" font-size="16">
Pattern: (?=CDC) checks without moving forward.
</text>

<text x="60" y="105" font-family="Arial" font-size="18">String:</text>

<!-- Character boxes -->
<rect x="140" y="80" width="55" height="55" fill="#eef2ff" stroke="black"/><text x="167.5" y="115" text-anchor="middle" font-family="Courier New" font-size="24">A</text><rect x="195" y="80" width="55" height="55" fill="#eef2ff" stroke="black"/><text x="222.5" y="115" text-anchor="middle" font-family="Courier New" font-size="24">B</text><rect x="250" y="80" width="55" height="55" fill="#eef2ff" stroke="black"/><text x="277.5" y="115" text-anchor="middle" font-family="Courier New" font-size="24">C</text><rect x="305" y="80" width="55" height="55" fill="#eef2ff" stroke="black"/><text x="332.5" y="115" text-anchor="middle" font-family="Courier New" font-size="24">D</text><rect x="360" y="80" width="55" height="55" fill="#eef2ff" stroke="black"/><text x="387.5" y="115" text-anchor="middle" font-family="Courier New" font-size="24">C</text><rect x="415" y="80" width="55" height="55" fill="#eef2ff" stroke="black"/><text x="442.5" y="115" text-anchor="middle" font-family="Courier New" font-size="24">D</text><rect x="470" y="80" width="55" height="55" fill="#eef2ff" stroke="black"/><text x="497.5" y="115" text-anchor="middle" font-family="Courier New" font-size="24">C</text>
<circle cx="305" cy="107" r="38" fill="none" stroke="#2563eb" stroke-width="3"/>
<line x1="332" y1="133" x2="355" y2="156" stroke="#2563eb" stroke-width="4"/>

<text x="60" y="185" font-family="Arial" font-size="18">Regex asks:</text>
<text x="190" y="185" font-family="Courier New" font-size="20">"Do the next 3 letters spell CDC?"</text>

<line x1="305" y1="145" x2="305" y2="210" stroke="black"/>

<rect x="160" y="220" width="680" height="70" fill="#f8fafc" stroke="black"/>
<text x="180" y="250" font-family="Courier New" font-size="20">Current position:  C  D  C</text>
<text x="180" y="275" font-family="Arial" font-size="17">Answer: Yes -> Count one match.</text>

<rect x="160" y="330" width="680" height="100" fill="#ecfeff" stroke="black"/>
<text x="180" y="360" font-family="Arial" font-size="18" font-weight="bold">Why "lookahead"?</text>
<text x="180" y="390" font-family="Arial" font-size="17">It only LOOKS ahead.</text>
<text x="180" y="415" font-family="Arial" font-size="17">It does not consume or skip characters.</text>

<rect x="120" y="460" width="760" height="60" fill="#eefbf0" stroke="black"/>
<text x="140" y="490" font-family="Courier New" font-size="18">re.findall(r'(?=CDC)', "ABCDCDC")</text>
<text x="140" y="513" font-family="Arial" font-size="17">Think of it like shining a flashlight at every position and asking:</text>
<text x="650" y="513" font-family="Courier New" font-size="17">"Does CDC start here?"</text>

</svg>
