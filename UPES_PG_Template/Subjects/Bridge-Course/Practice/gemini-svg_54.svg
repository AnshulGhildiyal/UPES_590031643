<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
<rect width="1100" height="620" fill="#0f172a"/>

<text x="550" y="42" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold" fill="white">
Regex Lookahead: Finding Overlapping Matches
</text>

<text x="550" y="70" text-anchor="middle" font-family="Arial" font-size="16" fill="#cbd5e1">
The pattern (?=CDC) checks for "CDC" without consuming characters, allowing overlaps.
</text>

<!-- Input -->
<rect x="60" y="100" width="980" height="90" rx="10" fill="#1f2937" stroke="#475569"/>
<text x="90" y="135" font-family="Arial" font-size="18" fill="#93c5fd">Input String</text>

<!-- Characters -->
<g font-family="Courier New" font-size="34" font-weight="bold">
<text x="130" y="170" fill="#ffffff">A</text>
<text x="180" y="170" fill="#ffffff">B</text>
<text x="230" y="170" fill="#ffffff">C</text>
<text x="280" y="170" fill="#ffffff">D</text>
<text x="330" y="170" fill="#ffffff">C</text>
<text x="380" y="170" fill="#ffffff">D</text>
<text x="430" y="170" fill="#ffffff">C</text>
</g>

<!-- Highlight -->
<rect x="220" y="145" width="170" height="38" rx="6" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-width="2"/>
<text x="305" y="205" text-anchor="middle" font-family="Arial" font-size="15" fill="#bbf7d0">
Regex sees "CDC"
</text>

<!-- Flow -->
<polygon points="510,220 590,220 590,205 640,245 590,285 590,270 510,270" fill="#38bdf8"/>
<text x="550" y="249" text-anchor="middle" fill="white" font-family="Arial" font-size="18">re.findall()</text>

<!-- Comparison -->
<rect x="60" y="310" width="460" height="240" rx="10" fill="#111827" stroke="#ef4444"/>
<text x="290" y="345" text-anchor="middle" fill="#fca5a5" font-family="Arial" font-size="22" font-weight="bold">
Traditional .find()
</text>
<text x="90" y="390" font-family="Courier New" font-size="18" fill="#e5e7eb">
Find "CDC" → move past match
</text>
<text x="90" y="430" font-family="Courier New" font-size="18" fill="#e5e7eb">
Overlapping patterns may be missed.
</text>
<text x="290" y="500" text-anchor="middle" fill="#fbbf24" font-family="Arial" font-size="18">
Consumes characters while searching
</text>

<rect x="580" y="310" width="460" height="240" rx="10" fill="#111827" stroke="#22c55e"/>
<text x="810" y="345" text-anchor="middle" fill="#bbf7d0" font-family="Arial" font-size="22" font-weight="bold">
Regex Lookahead
</text>
<text x="610" y="390" font-family="Courier New" font-size="18" fill="#e5e7eb">
Pattern: (?=CDC)
</text>
<text x="610" y="430" font-family="Courier New" font-size="18" fill="#e5e7eb">
Checks each position
</text>
<text x="610" y="470" font-family="Courier New" font-size="18" fill="#e5e7eb">
Does NOT consume characters
</text>
<text x="810" y="520" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="18">
Perfect for overlapping & complex pattern matching
</text>

<rect x="180" y="575" width="740" height="28" rx="6" fill="#1f2937" stroke="#475569"/>
<text x="550" y="594" text-anchor="middle" fill="#e5e7eb" font-family="Courier New" font-size="15">
re.findall(r'(?=CDC)', text) → returns every starting position where "CDC" begins.
</text>

</svg>