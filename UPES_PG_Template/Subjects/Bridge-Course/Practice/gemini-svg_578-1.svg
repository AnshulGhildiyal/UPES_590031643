<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
<rect width="960" height="560" fill="#fafafa"/>

<text x="480" y="40" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold">
Safe Set Intersection
</text>

<!-- Set -->
<rect x="60" y="90" width="360" height="180" fill="#eef6ff" stroke="#2563eb" stroke-width="2"/>
<text x="240" y="120" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">Set (S1)</text>
<text x="90" y="165" font-family="Courier New" font-size="18">{ Red, Yellow, Orange, Blue }</text>

<!-- List -->
<rect x="540" y="90" width="360" height="180" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="720" y="120" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">List</text>
<text x="590" y="165" font-family="Courier New" font-size="18">[ Blue, Purple, Black ]</text>

<!-- Wrong -->
<rect x="60" y="320" width="390" height="170" fill="#fff1f2" stroke="#dc2626" stroke-width="2"/>
<text x="255" y="355" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">Wrong</text>
<text x="90" y="395" font-family="Courier New" font-size="18">S1 &amp; list_of_colors</text>
<text x="90" y="435" font-family="Arial" font-size="18">Result:</text>
<text x="160" y="435" font-family="Arial" font-size="18" fill="#b91c1c">TypeError</text>
<text x="90" y="465" font-family="Arial" font-size="15">&amp; expects both operands to be Set objects.</text>

<!-- Right -->
<rect x="510" y="320" width="390" height="170" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="705" y="355" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">Correct</text>
<text x="540" y="395" font-family="Courier New" font-size="18">S1.intersection(list_of_colors)</text>
<text x="540" y="435" font-family="Arial" font-size="18">Result:</text>
<text x="610" y="435" font-family="Courier New" font-size="18" fill="#166534">{'blue'}</text>
<text x="540" y="465" font-family="Arial" font-size="15">intersection() accepts any iterable.</text>

<text x="480" y="535" text-anchor="middle" font-family="Arial" font-size="15">
Rule: Use '&amp;' for Set vs Set. Use intersection() when the other object may be a List, Tuple or any iterable.
</text>
</svg>
