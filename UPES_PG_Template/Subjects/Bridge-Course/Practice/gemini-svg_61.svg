<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">

  <rect width="1000" height="620" fill="#ffffff"></rect>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold">
    collections.Counter — Dynamic Frequency Counting
  </text>

  <text x="500" y="68" text-anchor="middle" font-family="Arial" font-size="16">
    Counter automatically discovers every unique value. No manual initialization required.
  </text>

  <!-- Input -->
  <rect x="60" y="100" width="880" height="70" fill="#EEF4FF" stroke="#4A6CF7" stroke-width="2"></rect>

  <text x="80" y="125" font-family="Arial" font-size="17" font-weight="bold">
    Input Transactions
  </text>

  <text x="80" y="150" font-family="Courier New" font-size="18">
    [0, 1, 2, 3, 2, 1, 0, 3, 3, 2]
  </text>

  <!-- Arrow -->
  <line x1="500" y1="170" x2="500" y2="215" stroke="black" stroke-width="2"></line>

  <text x="520" y="200" font-family="Courier New" font-size="18">
    Counter(...)
  </text>

  <!-- Left -->
  <rect x="60" y="230" width="400" height="280" fill="#FFF4E5" stroke="#E67E22" stroke-width="2"></rect>

  <text x="260" y="260" text-anchor="middle" font-family="Arial" font-size="21" font-weight="bold">
    Hardcoded Dictionary
  </text>

  <text x="80" y="300" font-family="Courier New" font-size="17">
counts = {0:0, 1:0, 2:0, 3:0}
  </text>

  <text x="80" y="350" font-family="Arial" font-size="17">
A new transaction appears:
  </text>

  <text x="80" y="385" font-family="Courier New" font-size="18">
4
  </text>

  <text x="110" y="385" font-family="Arial" font-size="17" fill="red">
Not counted automatically
  </text>

  <text x="80" y="440" font-family="Arial" font-size="16">
Developer must edit the dictionary.
  </text>

  <!-- Right -->
  <rect x="540" y="230" width="400" height="280" fill="#EAFBF0" stroke="#27AE60" stroke-width="2"></rect>

  <text x="740" y="260" text-anchor="middle" font-family="Arial" font-size="21" font-weight="bold">
collections.Counter
  </text>

  <text x="570" y="305" font-family="Courier New" font-size="17">
0 → 2
  </text>

  <text x="570" y="335" font-family="Courier New" font-size="17">
1 → 2
  </text>

  <text x="570" y="365" font-family="Courier New" font-size="17">
2 → 3
  </text>

  <text x="570" y="395" font-family="Courier New" font-size="17">
3 → 3
  </text>

  <text x="570" y="435" font-family="Courier New" font-size="17">
4 → 1   (if it appears)
  </text>

  <text x="570" y="475" font-family="Arial" font-size="16" fill="green">
Automatically handled. No code changes.
  </text>

  <!-- Footer -->
  <rect x="80" y="545" width="840" height="45" fill="#F5F5F5" stroke="#999"></rect>

  <text x="500" y="572" text-anchor="middle" font-family="Arial" font-size="15">
Counter scans the data once and creates counts for every unique value it finds.
  </text>

</svg>