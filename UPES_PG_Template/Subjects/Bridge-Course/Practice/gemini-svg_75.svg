<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650">

<rect width="1100" height="650" fill="white"></rect>

<!-- Title -->

<text x="550" y="40" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold">
Lambda + map() = Batch Processing
</text>

<text x="550" y="68" text-anchor="middle" font-family="Arial" font-size="16">
Instead of looping manually, map() applies the lambda to every item automatically.
</text>

<!-- DATASET -->

<rect x="50" y="110" width="320" height="420" fill="#EEF4FF" stroke="#4A6CF7" stroke-width="2"></rect>

<text x="210" y="145" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Dataset
</text>

<text x="90" y="185" font-family="Courier New" font-size="18">
(radius, height)
</text>

<text x="90" y="225" font-family="Courier New" font-size="18">(3, 5)</text>
<text x="90" y="260" font-family="Courier New" font-size="18">(2, 8)</text>
<text x="90" y="295" font-family="Courier New" font-size="18">(7, 4)</text>
<text x="90" y="330" font-family="Courier New" font-size="18">(5, 6)</text>
<text x="90" y="365" font-family="Courier New" font-size="18">(4, 9)</text>

<text x="210" y="450" text-anchor="middle" font-family="Arial" font-size="17">
Imagine 5,000 rows...
</text>

<!-- Processing -->

<line x1="370" y1="320" x2="470" y2="320" stroke="black" stroke-width="2"></line>

<rect x="470" y="220" width="170" height="200" fill="#FFF8DC" stroke="#C89B00" stroke-width="2"></rect>

<text x="555" y="255" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
map()
</text>

<text x="555" y="295" text-anchor="middle" font-family="Courier New" font-size="16">
lambda
</text>

<text x="555" y="325" text-anchor="middle" font-family="Courier New" font-size="16">
(r,h)
</text>

<text x="555" y="355" text-anchor="middle" font-family="Courier New" font-size="16">
→
</text>

<text x="555" y="385" text-anchor="middle" font-family="Courier New" font-size="16">
Volume
</text>

<!-- Output -->

<line x1="640" y1="320" x2="740" y2="320" stroke="black" stroke-width="2"></line>

<rect x="740" y="110" width="310" height="420" fill="#F0FFF4" stroke="#2E8B57" stroke-width="2"></rect>

<text x="895" y="145" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Output
</text>

<text x="780" y="185" font-family="Courier New" font-size="18">
47.12
</text>

<text x="780" y="220" font-family="Courier New" font-size="18">
33.51
</text>

<text x="780" y="255" font-family="Courier New" font-size="18">
205.25
</text>

<text x="780" y="290" font-family="Courier New" font-size="18">
157.08
</text>

<text x="780" y="325" font-family="Courier New" font-size="18">
150.80
</text>

<text x="895" y="450" text-anchor="middle" font-family="Arial" font-size="17">
Every tuple becomes one volume.
</text>

<!-- Footer -->

<rect x="80" y="575" width="940" height="40" fill="#F5F5F5" stroke="#999999"></rect>

<text x="550" y="600" text-anchor="middle" font-family="Arial" font-size="15">
map() repeatedly calls the lambda for every element, producing a new collection without writing a manual for-loop.
</text>

</svg>