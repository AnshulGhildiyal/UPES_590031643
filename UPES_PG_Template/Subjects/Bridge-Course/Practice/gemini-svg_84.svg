<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">

<rect width="1200" height="720" fill="white"></rect>

<!-- ================= TITLE ================= -->

<text x="600" y="42" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold">
Exception Handling (try / except)
</text>

<text x="600" y="70" text-anchor="middle" font-family="Arial" font-size="16">
Every input passes through a safety shield before the program continues.
</text>

<!-- ================= INPUT ================= -->

<rect x="40" y="110" width="260" height="500" fill="#EEF4FF" stroke="#3B82F6" stroke-width="2"></rect>

<text x="170" y="145" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Student Answers
</text>

<rect x="70" y="190" width="200" height="60" fill="white" stroke="black"></rect>

<text x="90" y="225" font-family="Courier New" font-size="18">
1 0
</text>

<rect x="70" y="280" width="200" height="60" fill="white" stroke="black"></rect>

<text x="90" y="315" font-family="Courier New" font-size="18">
2 $
</text>

<rect x="70" y="370" width="200" height="60" fill="white" stroke="black"></rect>

<text x="90" y="405" font-family="Courier New" font-size="18">
3 1
</text>

<text x="170" y="520" text-anchor="middle" font-family="Arial" font-size="16">
One test case at a time
</text>

<!-- Arrow -->

<line x1="300" y1="360" x2="430" y2="360" stroke="black" stroke-width="2"></line>

<!-- ================= TRY BLOCK ================= -->

<rect x="430" y="110" width="340" height="500" fill="#FFF8DC" stroke="#D97706" stroke-width="2"></rect>

<text x="600" y="145" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
try
</text>

<text x="600" y="180" text-anchor="middle" font-family="Arial" font-size="18">
Attempt
</text>

<rect x="480" y="230" width="240" height="90" fill="white" stroke="black"></rect>

<text x="600" y="265" text-anchor="middle" font-family="Courier New" font-size="18">
int(a) // int(b)
</text>

<text x="600" y="295" text-anchor="middle" font-family="Arial" font-size="15">
Normal execution
</text>

<rect x="480" y="370" width="240" height="170" fill="#FFF0F0" stroke="#D62828"></rect>

<text x="600" y="405" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold">
Blast Shield
</text>

<text x="600" y="445" text-anchor="middle" font-family="Courier New" font-size="16">
except ZeroDivisionError
</text>

<text x="600" y="475" text-anchor="middle" font-family="Courier New" font-size="16">
except ValueError
</text>

<text x="600" y="515" text-anchor="middle" font-family="Arial" font-size="15">
Catch errors without
</text>

<text x="600" y="535" text-anchor="middle" font-family="Arial" font-size="15">
crashing the program
</text>

<!-- Arrow -->

<line x1="770" y1="360" x2="900" y2="360" stroke="black" stroke-width="2"></line>

<!-- ================= OUTPUT ================= -->

<rect x="900" y="110" width="260" height="500" fill="#EEFDF3" stroke="#16A34A" stroke-width="2"></rect>

<text x="1030" y="145" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Program Output
</text>

<rect x="930" y="185" width="200" height="70" fill="white" stroke="black"></rect>

<text x="950" y="225" font-family="Courier New" font-size="16">
Div by Zero
</text>

<rect x="930" y="285" width="200" height="70" fill="white" stroke="black"></rect>

<text x="950" y="325" font-family="Courier New" font-size="16">
Bad Character
</text>

<rect x="930" y="385" width="200" height="70" fill="white" stroke="black"></rect>

<text x="950" y="425" font-family="Courier New" font-size="16">
Success: 3
</text>

<text x="1030" y="525" text-anchor="middle" font-family="Arial" font-size="16">
Processing continues...
</text>

<!-- ================= FOOTER ================= -->

<rect x="70" y="650" width="1060" height="35" fill="#F3F4F6" stroke="#999999"></rect>

<text x="600" y="672" text-anchor="middle" font-family="Arial" font-size="15">
Without try/except, the program stops at the first error. With exception handling, every remaining input is still processed.
</text>

</svg>