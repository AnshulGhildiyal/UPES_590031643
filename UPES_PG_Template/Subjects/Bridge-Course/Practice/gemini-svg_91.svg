<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">

<rect width="1200" height="760" fill="white"></rect>

<!-- ========================= TITLE ========================= -->

<text x="600" y="42" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold">
Class vs Object
</text>

<text x="600" y="70" text-anchor="middle" font-family="Arial" font-size="17">
One Student class (template) can create thousands of different Student objects.
</text>

