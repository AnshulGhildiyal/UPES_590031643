<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">

<rect width="1200" height="760" fill="white"></rect>

<!-- ================= TITLE ================= -->

<text x="600" y="42" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold">
Object Methods and Class Aggregation
</text>

<text x="600" y="72" text-anchor="middle" font-family="Arial" font-size="17">
Each Student object calculates its own result. The class_average() function combines everyone's scores.
</text>

<!-- ================= OBJECT 1 ================= -->

<rect x="60" y="130" width="300" height="420" fill="#EEF6FF" stroke="#3B82F6" stroke-width="2"></rect>

<text x="210" y="165" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Student Object
</text>

<text x="90" y="215" font-family="Courier New" font-size="17">
Name : Ray
</text>

<text x="90" y="245" font-family="Courier New" font-size="17">
PHY : 78
</text>

<text x="90" y="275" font-family="Courier New" font-size="17">
CHEM: 67
</text>

<text x="90" y="305" font-family="Courier New" font-size="17">
MATH: 81
</text>

<line x1="90" y1="325" x2="330" y2="325" stroke="#cccccc"></line>

<text x="90" y="360" font-family="Courier New" font-size="16">
marks_percentage()
</text>

<text x="260" y="360" font-family="Courier New" font-size="16">
75.33%
</text>

<text x="90" y="400" font-family="Courier New" font-size="16">
result()
</text>

<text x="260" y="400" font-family="Courier New" font-size="16">
PASS
</text>

