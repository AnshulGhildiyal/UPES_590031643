<!-- ================= ARROWS ================= -->

<line x1="210" y1="550" x2="600" y2="610" stroke="black" stroke-width="2"></line>
<line x1="600" y1="550" x2="600" y2="610" stroke="black" stroke-width="2"></line>
<line x1="990" y1="550" x2="600" y2="610" stroke="black" stroke-width="2"></line>

<!-- ================= AGGREGATOR ================= -->

<rect x="360" y="610" width="480" height="100" fill="#EEFDF3" stroke="#16A34A" stroke-width="2"></rect>

<text x="600" y="645" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold">
class_average(records)
</text>

<text x="600" y="680" text-anchor="middle" font-family="Courier New" font-size="20">
(75.33 + 88.33 + 58.67) / 3 = 74.11%
</text>

