<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">

<rect width="1200" height="760" fill="white"></rect>

<!-- ================= TITLE ================= -->

<text x="600" y="42" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold">
Method Overriding
</text>

<text x="600" y="70" text-anchor="middle" font-family="Arial" font-size="17">
A child class keeps the same method name but replaces the parent's implementation.
</text>

<!-- ================= PARENT CLASS ================= -->

<rect x="70" y="120" width="430" height="430" fill="#EEF6FF" stroke="#2563EB" stroke-width="2"></rect>

<text x="285" y="160" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold">
Parent Class
</text>

<text x="285" y="190" text-anchor="middle" font-family="Arial" font-size="18">
BaseAlgorithm
</text>

<line x1="100" y1="215" x2="470" y2="215" stroke="#CCCCCC"></line>

<text x="120" y="255" font-family="Courier New" font-size="17">
execute_trade()
</text>

<rect x="120" y="285" width="330" height="90" fill="white" stroke="black"></rect>

<text x="285" y="325" text-anchor="middle" font-family="Arial" font-size="17">
Standard Market Order
</text>

<text x="285" y="350" text-anchor="middle" font-family="Courier New" font-size="15">
Buy AAPL at 9:00 AM
</text>

<text x="285" y="450" text-anchor="middle" font-family="Arial" font-size="16">
Default implementation
</text>

<!-- Arrow -->

<line x1="500" y1="335" x2="700" y2="335" stroke="black" stroke-width="2"></line>

<polygon points="695,330 705,335 695,340" fill="black"></polygon>

<text x="600" y="315" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold">
Overrides
</text>

<!-- ================= CHILD CLASS ================= -->

<rect x="700" y="120" width="430" height="430" fill="#EEFDF3" stroke="#16A34A" stroke-width="2"></rect>

<text x="915" y="160" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold">
Child Class
</text>

<text x="915" y="190" text-anchor="middle" font-family="Arial" font-size="18">
ProjectVegapunk
</text>

<line x1="730" y1="215" x2="1100" y2="215" stroke="#CCCCCC"></line>

<text x="750" y="255" font-family="Courier New" font-size="17">
execute_trade()
</text>

<rect x="750" y="285" width="330" height="150" fill="white" stroke="black"></rect>

<text x="915" y="320" text-anchor="middle" font-family="Arial" font-size="17">
Fetch Morning Data
</text>

<text x="915" y="350" text-anchor="middle" font-family="Arial" font-size="17">
Run Sentiment Analysis
</text>

<text x="915" y="380" text-anchor="middle" font-family="Arial" font-size="17">
Execute Paper Trade
</text>

<text x="915" y="475" text-anchor="middle" font-family="Arial" font-size="16">
New implementation replaces the parent version
</text>

<!-- ================= EXECUTION ================= -->

<rect x="170" y="600" width="860" height="100" fill="#FFF8DC" stroke="#D97706" stroke-width="2"></rect>

<text x="600" y="635" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
When execute_trade() is called...
</text>

<text x="600" y="670" text-anchor="middle" font-family="Courier New" font-size="17">
BaseAlgorithm() → Parent version runs
</text>

<text x="600" y="695" text-anchor="middle" font-family="Courier New" font-size="17">
ProjectVegapunk() → Child version runs automatically
</text>

<!-- ================= FOOTER ================= -->

<rect x="80" y="725" width="1040" height="22" fill="#F3F4F6" stroke="#999999"></rect>

<text x="600" y="741" text-anchor="middle" font-family="Arial" font-size="14">
Overriding means using the same method name in the child class to provide different behavior than the parent class.
</text>

</svg>