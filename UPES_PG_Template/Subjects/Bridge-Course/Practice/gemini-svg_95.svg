<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">

<rect width="1200" height="760" fill="white"></rect>

<!-- ================= TITLE ================= -->

<text x="600" y="42" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold">
Operator Overloading (+)
</text>

<text x="600" y="70" text-anchor="middle" font-family="Arial" font-size="17">
Teach Python what '+' should mean for your own objects.
</text>

<!-- ================= LEFT POINT ================= -->

<rect x="60" y="120" width="260" height="250" fill="#EEF6FF" stroke="#2563EB" stroke-width="2"></rect>

<text x="190" y="160" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Point A
</text>

<text x="190" y="215" text-anchor="middle" font-family="Courier New" font-size="20">
x = 10
</text>

<text x="190" y="255" text-anchor="middle" font-family="Courier New" font-size="20">
y = 20
</text>

<text x="190" y="315" text-anchor="middle" font-family="Courier New" font-size="18">
Point(10,20)
</text>

<!-- PLUS -->

<text x="360" y="245" text-anchor="middle" font-family="Arial" font-size="48" font-weight="bold">
+
</text>

<!-- RIGHT POINT -->

<rect x="430" y="120" width="260" height="250" fill="#FFF8DC" stroke="#D97706" stroke-width="2"></rect>

<text x="560" y="160" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
Point B
</text>

<text x="560" y="215" text-anchor="middle" font-family="Courier New" font-size="20">
x = 12
</text>

<text x="560" y="255" text-anchor="middle" font-family="Courier New" font-size="20">
y = 15
</text>

<text x="560" y="315" text-anchor="middle" font-family="Courier New" font-size="18">
Point(12,15)
</text>

<!-- EQUAL -->

<text x="730" y="245" text-anchor="middle" font-family="Arial" font-size="48" font-weight="bold">
=
</text>

<!-- RESULT -->

<rect x="800" y="120" width="340" height="250" fill="#EEFDF3" stroke="#16A34A" stroke-width="2"></rect>

<text x="970" y="160" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
New Point
</text>

<text x="970" y="215" text-anchor="middle" font-family="Courier New" font-size="20">
x = 22
</text>

<text x="970" y="255" text-anchor="middle" font-family="Courier New" font-size="20">
y = 35
</text>

<text x="970" y="315" text-anchor="middle" font-family="Courier New" font-size="18">
Point(22,35)
</text>

<!-- FLOW -->

<line x1="600" y1="400" x2="600" y2="455" stroke="black" stroke-width="2"></line>

<rect x="300" y="455" width="600" height="170" fill="#F8FAFC" stroke="#888" stroke-width="2"></rect>

<text x="600" y="495" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">
What Happens Internally?
</text>

<text x="600" y="535" text-anchor="middle" font-family="Courier New" font-size="18">
p3 = p1 + p2
</text>

<text x="600" y="570" text-anchor="middle" font-family="Courier New" font-size="18">
↓
</text>

<text x="600" y="605" text-anchor="middle" font-family="Courier New" font-size="18">
Python automatically calls
</text>

<text x="600" y="635" text-anchor="middle" font-family="Courier New" font-size="20" font-weight="bold">
__add__(p1, p2)
</text>

<!-- FOOTER -->

<rect x="70" y="705" width="1060" height="28" fill="#F3F4F6" stroke="#999"></rect>

<text x="600" y="724" text-anchor="middle" font-family="Arial" font-size="15">
Operator overloading lets built-in operators like +, -, *, and == work with your own classes by defining special (dunder) methods.
</text>

</svg>